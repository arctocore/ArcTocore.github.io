<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0f172a" />
  <title>SportTactix</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.webmanifest" />
</head>
<body>
  <!-- App Shell -->
  <div id="app">
    <!-- Sidebar -->
    <aside id="sidebar" class="sidebar">
      <div class="brand">
        <div class="brand-logo">
          <svg viewBox="0 0 48 48" width="30" height="30" aria-hidden="true"><defs><linearGradient id="btl" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#ff6a00"/><stop offset="1" stop-color="#ff2d6f"/></linearGradient></defs><rect x="3" y="3" width="42" height="42" rx="12" fill="url(#btl)"/><circle cx="24" cy="24" r="12" fill="none" stroke="#fff" stroke-width="2.4"/><path d="M24 12v24M12 24h24M15.5 15.5l17 17M32.5 15.5l-17 17" stroke="#fff" stroke-width="2" stroke-linecap="round"/><circle cx="24" cy="24" r="3.4" fill="#fff"/></svg>
        </div>
        <div class="brand-text">
          <strong>SportTactix</strong>
          <span data-i18n="brand.tagline">Coaching Platform</span>
        </div>
      </div>
      <div class="sport-picker">
        <label for="sportSelect" data-i18n="sport.choose">Choose Sport</label>
        <select id="sportSelect"></select>
      </div>
      <nav class="nav" id="mainNav">
        <a data-route="dashboard" class="nav-item active"><span class="ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg></span> <span data-i18n="nav.dashboard">Dashboard</span></a>
        <a data-route="teams" class="nav-item"><span class="ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg></span> <span data-i18n="nav.teams">Teams &amp; Players</span></a>
        <a data-route="matches" class="nav-item"><span class="ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 21h18M5 21V7l8-4v18M19 21V11l-6-4"/><path d="M9 9v0M9 13v0M9 17v0"/></svg></span> <span data-i18n="nav.matches">Matches</span></a>
        <a data-route="scouting" class="nav-item"><span class="ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2M9 2h6"/></svg></span> <span data-i18n="nav.scouting">Live Scouting</span></a>
        <a data-route="statistics" class="nav-item"><span class="ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 3v18h18"/><path d="M7 15l4-4 3 3 5-6"/></svg></span> <span data-i18n="nav.statistics">Statistics</span></a>
        <a data-route="tactics" class="nav-item"><span class="ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></span> <span data-i18n="nav.tactics">Tactical Board</span></a>
        <a data-route="video" class="nav-item"><span class="ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="2" y="5" width="15" height="14" rx="2"/><path d="m17 9 5-3v12l-5-3"/></svg></span> <span data-i18n="nav.video">Video Analysis</span></a>
        <a data-route="training" class="nav-item"><span class="ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 7v10M18 7v10M4 9v6M20 9v6M6 12h12"/></svg></span> <span data-i18n="nav.training">Training Planner</span></a>
        <a data-route="exercises" class="nav-item"><span class="ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/></svg></span> <span data-i18n="nav.exercises">Exercise Library</span></a>
        <a data-route="opponents" class="nav-item"><span class="ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg></span> <span data-i18n="nav.opponents">Opponent Analysis</span></a>
        <a data-route="reports" class="nav-item"><span class="ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6M9 13h6M9 17h6"/></svg></span> <span data-i18n="nav.reports">Reports</span></a>
        <a data-route="settings" class="nav-item"><span class="ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg></span> <span data-i18n="nav.settings">Settings</span></a>
        <a href="help.html" target="_blank" class="nav-item"><span class="ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg></span> <span data-i18n="nav.help">Help &amp; Tutorials</span></a>
        <div class="nav-controls">
          <button type="button" id="navThemeToggle" class="theme-switch">
            <span class="ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg></span>
            <span data-i18n="nav.theme">Light / Dark</span>
          </button>
        </div>
      </nav>
      <div class="sidebar-footer">
        <span id="syncStatus" class="sync-badge"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-2px"><path d="M18 6 7 17l-5-5"/><path d="m22 10-7.5 7.5L13 16"/></svg> <span data-i18n="footer.offline">Offline Ready</span></span>
        <div class="author">© 2026 ArcToCore — Steen Østerby Rasmussen</div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <button id="menuToggle" class="icon-btn" aria-label="Menu"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
        <div class="search-box">
          <input id="globalSearch" type="search" data-i18n-ph="search.placeholder" placeholder="Search players, matches, drills, tactics..." />
          <div id="searchResults" class="search-results hidden"></div>
        </div>
        <div class="topbar-actions">
          <div class="lang-switch" id="langSwitch">
            <button type="button" data-lang="en" class="active" title="English">
              <svg viewBox="0 0 60 30" width="22" height="12" aria-hidden="true"><clipPath id="fen"><rect width="60" height="30"/></clipPath><g clip-path="url(#fen)"><rect width="60" height="30" fill="#012169"/><path d="M0,0 60,30M60,0 0,30" stroke="#fff" stroke-width="6"/><path d="M0,0 60,30M60,0 0,30" stroke="#C8102E" stroke-width="4"/><path d="M30,0 V30M0,15 H60" stroke="#fff" stroke-width="10"/><path d="M30,0 V30M0,15 H60" stroke="#C8102E" stroke-width="6"/></g></svg>
              <span>EN</span>
            </button>
            <button type="button" data-lang="da" title="Dansk">
              <svg viewBox="0 0 37 28" width="22" height="12" aria-hidden="true"><rect width="37" height="28" fill="#C8102E"/><rect x="12" width="4" height="28" fill="#fff"/><rect y="12" width="37" height="4" fill="#fff"/></svg>
              <span>DA</span>
            </button>
          </div>
          <span id="autosaveIndicator" class="autosave">Saved</span>
          <button id="themeToggle" class="icon-btn" title="Toggle theme"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg></button>
          <div class="role-badge" id="roleBadge">Coach</div>
        </div>
      </header>
      <section id="view" class="view"><!-- routed content --></section>
    </main>
  </div>

  <!-- Modal host -->
  <div id="modalHost" class="modal-host hidden"></div>
  <div id="toastHost" class="toast-host"></div>

  <script src="db.js"></script>
  <script src="i18n.js"></script>
  <script src="sports.js"></script>
  <script src="store.js"></script>
  <script src="ui.js"></script>
  <script src="dashboard.js"></script>
  <script src="teams.js"></script>
  <script src="matches.js"></script>
  <script src="scouting.js"></script>
  <script src="statistics.js"></script>
  <script src="tactics.js"></script>
  <script src="video.js"></script>
  <script src="training.js"></script>
  <script src="exercises.js"></script>
  <script src="opponents.js"></script>
  <script src="reports.js"></script>
  <script src="settings.js"></script>
  <script src="app.js"></script>
</body>
</html>
