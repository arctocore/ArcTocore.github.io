<body>

              <linearGradient id="stTop" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#ffe3b0"/>
              </linearGradient>
              <linearGradient id="stBot" x1="0" y1="1" x2="1" y2="0">
                <stop offset="0" stop-color="#ffffff"/><stop offset="1" stop-color="#ead6ff"/>
              </linearGradient>
            </defs>
            <rect x="3" y="3" width="42" height="42" rx="13" fill="url(#stg)"/>
            <rect x="3" y="3" width="42" height="42" rx="13" fill="url(#stGloss)"/>

          </svg>
        </div>
        <div class="brand-text">
          <strong>SportTactix</strong>
          <span data-i18n="brand.tagline">Coaching Platform</span>
        </div>
      </div>
      <div class="sport-picker">
        <label for="sportSelect" data-i18n="sport.choose">Choose Sport</label>
        <select id="sportSelect"></select>

        <div class="nav-controls">
          <button type="button" id="navThemeToggle" class="theme-switch">
            <span class="ico"><svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg></span>

      <div class="sidebar-footer">
        <span id="syncStatus" class="sync-badge"><svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" style="vertical-align:-2px"><path d="M18 6 7 17l-5-5"/><path d="m22 10-7.5 7.5L13 16"/></svg> <span data-i18n="footer.offline">Offline Ready</span></span>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <button id="menuToggle" class="icon-btn" aria-label="Menu"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12h18M3 6h18M3 18h18"/></svg></button>
        <div class="search-box">
          <input id="globalSearch" type="search" data-i18n-ph="search.placeholder" placeholder="Search players, matches, drills, tactics..." />
          <div id="searchResults" class="search-results hidden"></div>
        </div>
        <div class="topbar-actions">
          <div class="lang-switch" id="langSwitch">
            <button type="button" data-lang="en" class="active" title="English">
              <svg viewBox="0 0 60 30" width="22" height="12" aria-hidden="true"><clipPath id="fen"><rect width="60" height="30"/></clipPath><g clip-path="url(#fen)"><rect width="60" height="30" fill="#012169"/><path d="M0,0 60,30M60,0 0,30" stroke="#fff" stroke-width="6"/><path d="M0,0 60,30M60,0 0,30" stroke="#C8102E" stroke-width="4"/><path d="M30,0 V30M0,15 H60" stroke="#fff" stroke-width="10"/><path d="M30,0 V30M0,15 H60" stroke="#C8102E" stroke-width="6"/></g></svg>
              <span>EN</span>
            </button>
            <button type="button" data-lang="da" title="Dansk">
              <svg viewBox="0 0 37 28" width="22" height="12" aria-hidden="true"><rect width="37" height="28" fill="#C8102E"/><rect x="12" width="4" height="28" fill="#fff"/><rect y="12" width="37" height="4" fill="#fff"/></svg>
              <span>DA</span>
            </button>
          </div>
          <span id="autosaveIndicator" class="autosave">Saved</span>
          <button id="soundToggle" class="icon-btn" title="Sound"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M11 5 6 9H2v6h4l5 4z"/><path d="M15.5 8.5a5 5 0 0 1 0 7M19 5a9 9 0 0 1 0 14"/></svg></button>
          <button id="themeToggle" class="icon-btn" title="Toggle theme"><svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8z"/></svg></button>
          <div class="role-badge" id="roleBadge">Coach</div>
        </div>
      </header>
      <section id="view" class="view"><!-- routed content --></section>
    </main>
